name: Update README
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: stats-state-${{ github.run_number }}
          restore-keys: |
            stats-state-

      - name: Generate README
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python readme.py

      - name: Commit README changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Delete old caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_KEY="stats-state-${{ github.run_number }}"
          gh cache list --key "stats-state-" --json id,key \
            --jq ".[] | select(.key != \"$CURRENT_KEY\") | .id" \
            | xargs -r -I{} gh cache delete {}